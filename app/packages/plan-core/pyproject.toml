[project]
name = "plan-core"
version = "0.1.0"
description = "Floor-Plan Studio core: schema v2 geometry, wall derivation, diff engine, typed ops + validation, Pillow export."
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7",
    "pillow>=10.1",
]

[dependency-groups]
dev = ["pytest>=8.3", "ruff>=0.14", "mypy>=1.14"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/plan_core"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.mypy]
strict = true
python_version = "3.11"

[[tool.mypy.overrides]]
module = "PIL.*"
ignore_missing_imports = true
