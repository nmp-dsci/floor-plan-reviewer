name: floor-plan-studio

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: studio
      POSTGRES_PASSWORD: studio
      POSTGRES_DB: studio
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studio"]
      interval: 3s
      timeout: 3s
      retries: 20

  plan-agent:
    build:
      context: .
      dockerfile: services/plan-agent/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      PLAN_AGENT_MODEL: ${PLAN_AGENT_MODEL:-deepseek:deepseek-chat}
      VISION_MODEL: ${VISION_MODEL:-anthropic:claude-opus-4-8}
      AGENT_MODE: ${AGENT_MODE:-llm}
    ports:
      - "8091:8091"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request;urllib.request.urlopen('http://localhost:8091/health')\""]
      interval: 5s
      timeout: 5s
      retries: 30

  backend-api:
    build:
      context: .
      dockerfile: services/backend-api/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://studio:studio@db:5432/studio
      AGENT_URL: http://plan-agent:8091
      SEED_DIR: /app/seed
      STORAGE_DIR: /data
    volumes:
      - storage:/data
    ports:
      - "8090:8090"
    depends_on:
      db:
        condition: service_healthy
      plan-agent:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request;urllib.request.urlopen('http://localhost:8090/api/health')\""]
      interval: 5s
      timeout: 5s
      retries: 30

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      BACKEND_URL: http://backend-api:8090
    ports:
      - "5175:5173"
    depends_on:
      backend-api:
        condition: service_healthy

volumes:
  dbdata:
  storage:
